[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"

solc_version       = "0.8.23"
optimizer          = true
optimizer_runs     = 200
via_ir             = false

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true
